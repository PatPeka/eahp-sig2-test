<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>EAHP SIG 2 Working Decks</title>
  <style>
    :root {
      --background: #eef2ef;
      --surface: #ffffff;
      --surface-muted: #f6f8f6;
      --ink: #172329;
      --muted: #5b6970;
      --line: #d5ded9;
      --accent: #197c72;
      --hero: #12343b;
      --hero-muted: #cfe5df;
      --shadow: 0 18px 48px rgba(23, 35, 41, 0.12);
    }

    * {
      box-sizing: border-box;
    }

    body {
      margin: 0;
      min-height: 100vh;
      padding: clamp(20px, 5vw, 56px);
      background: var(--background);
      color: var(--ink);
      font-family: Arial, Helvetica, sans-serif;
    }

    main {
      width: min(920px, 100%);
      margin: 0 auto;
    }

    .hero {
      padding: clamp(30px, 6vw, 64px);
      border-radius: 8px;
      background: var(--hero);
      color: #ffffff;
      box-shadow: var(--shadow);
    }

    h1 {
      margin: 0 0 16px;
      font-size: clamp(2.35rem, 7vw, 5rem);
      line-height: 1.03;
    }

    .subtitle {
      max-width: 680px;
      margin: 0;
      color: var(--hero-muted);
      font-size: clamp(1.05rem, 2.2vw, 1.35rem);
      line-height: 1.5;
    }

    .content {
      margin-top: 30px;
    }

    h2 {
      margin: 0 0 14px;
      font-size: 1rem;
      text-transform: uppercase;
    }

    .deck-list {
      display: grid;
      gap: 14px;
    }

    .deck-card {
      display: block;
      padding: 24px;
      border: 1px solid var(--line);
      border-radius: 8px;
      background: var(--surface);
    }

    a.deck-card {
      color: var(--ink);
      text-decoration: none;
      box-shadow: 0 8px 24px rgba(23, 35, 41, 0.06);
    }

    a.deck-card:hover,
    a.deck-card:focus-visible {
      border-color: var(--accent);
      outline: 3px solid rgba(25, 124, 114, 0.18);
    }

    .deck-card strong {
      display: block;
      font-size: clamp(1.15rem, 2vw, 1.4rem);
      line-height: 1.3;
    }

    .deck-card-muted {
      background: var(--surface-muted);
      color: var(--muted);
      cursor: not-allowed;
    }

    .template-note {
      margin: 24px 0 0;
      padding-top: 20px;
      border-top: 1px solid var(--line);
      color: var(--muted);
      line-height: 1.5;
    }

    code {
      padding: 2px 6px;
      border-radius: 4px;
      background: var(--surface);
      color: var(--ink);
      font-family: Consolas, "Courier New", monospace;
    }
  </style>
</head>
<body>
  <main>
    <header class="hero">
      <h1>EAHP SIG 2 Working Decks</h1>
      <p class="subtitle">Codex-generated prototype for SIG 2 meeting support.</p>
    </header>

    <section class="content" aria-labelledby="meeting-decks-title">
      <h2 id="meeting-decks-title">Meeting decks</h2>
      <div class="deck-list">
        <a class="deck-card" href="01-meetings/call-01/">
          <strong>Call #1 — Patient-specific dispense orders and unit-dose labeling</strong>
        </a>

        <div class="deck-card deck-card-muted" aria-disabled="true">
          <strong>Call #2 — Coming soon</strong>
        </div>
      </div>

      <p class="template-note">
        The reusable meeting deck template is available in <code>templates/meeting-deck/</code>.
      </p>
    </section>
  </main>
</body>
</html>
